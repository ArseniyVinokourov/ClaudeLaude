name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compute version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # PATCH = commits in the merged PR (from the squash subject "... (#NN)").
          subj=$(git log -1 --format='%s')
          pr_num=$(printf '%s' "$subj" | grep -oE '\(#[0-9]+\)' | tail -1 | tr -d '(#)')
          if [ -n "$pr_num" ]; then
            patch=$(gh api "/repos/$REPO/pulls/$pr_num" --jq '.commits' 2>/dev/null || echo 0)
          else
            patch=0
          fi

          # MAJOR/MINOR + milestone handling live in the script (unit-tested).
          v=$(bash scripts/compute-version.sh "$patch")

          if [ -z "$v" ] || [ "$v" = ".." ]; then
            echo "::error::Failed to compute version"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Computed version: $v"

      - name: Skip if tag already exists
        id: check
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          if git rev-parse "v$V" >/dev/null 2>&1; then
            echo "Tag v$V already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag
        if: steps.check.outputs.skip != 'true'
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          # Tag only — never auto-create a GitHub Release. A Release is the
          # owner's manual "this is now available to update to" gate: the bot
          # checks releases/latest, which stays empty until the owner clicks
          # "Draft a new release" → picks a tag → Publish. Tags keep flowing on
          # every merge so version.py / git describe stay accurate; they just
          # no longer trigger "update available" on their own.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$V" -m "v$V"
          git push origin "v$V"
